name: applymate
description: ApplyMate — AI-powered job application assistant.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.15.0

  # Routing
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1

  # Networking
  http: ^1.2.1

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # File handling
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  path_provider: ^2.1.3

  # URL launching / webview for Stripe Checkout fallback
  url_launcher: ^6.3.0

  # Local storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # UI helpers
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Date / time / number formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# App launcher icon (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#1B3A6B"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/
  fonts:
    # Inter is the official typeface (blueprint I1). Variable font — Flutter
    # maps FontWeight to the wght axis automatically.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
